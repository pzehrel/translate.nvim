name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          version: stable
          neovim: true

      - uses: JohnnyMorganz/stylua-action@v4
        with:
          version: latest
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --check lua plugin scripts tests

      - uses: lunarmodules/luacheck@v1

      - name: Install LuaLS
        run: |
          curl -L --fail --output /tmp/luals.tar.gz \
            https://github.com/LuaLS/lua-language-server/releases/download/3.18.2/lua-language-server-3.18.2-linux-x64.tar.gz
          mkdir -p "$HOME/.local/share/luals"
          tar -xzf /tmp/luals.tar.gz -C "$HOME/.local/share/luals"
          echo "$HOME/.local/share/luals/bin" >> "$GITHUB_PATH"

      - run: make typecheck

      - run: make test
